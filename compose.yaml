services:
  postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
    restart: on-failure
    environment:
      POSTGRES_USER: ${MONGO_ROOT_USERNAME}
      POSTGRES_PASSWORD: ${MONGO_ROOT_PASSWORD}
      POSTGRES_DB: postgres
    command: >
      postgres
      -c cron.log_min_messages=fatal
      -c cron.log_run=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MONGO_ROOT_USERNAME} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2.7.0
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@postgres:5432/postgres

  app:
    build: .
    restart: unless-stopped
    depends_on:
      ferretdb:
        condition: service_started
    environment:
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@ferretdb:27017/${MONGO_DB}?authSource=admin
      MONGO_DB: ${MONGO_DB}
      APP_PORT: ${APP_PORT}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    depends_on:
      ferretdb:
        condition: service_started
    ports:
      - "0.0.0.0:8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@ferretdb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${WEB_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${WEB_PASSWORD}

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  postgres_data: